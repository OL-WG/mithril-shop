<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>MITHRILARM 💪</h1>

    <div class="product-grid">
        <div class="product-item">
            <img src="ruchka.webp" alt="Ручка">
            <h4>Ручка Arm</h4>
            <div class="price">3500 ₽</div>
            <div class="count-control">
                <button class="cnt-btn" onclick="changeCount('Ручка', 3500, -1)">-</button>
                <span id="count-Ручка">0</span>
                <button class="cnt-btn" onclick="changeCount('Ручка', 3500, 1)">+</button>
            </div>
        </div>

        <div class="product-item">
            <img src="expander.webp" alt="Эспандер">
            <h4>Эспандер</h4>
            <div class="price">1200 ₽</div>
            <div class="count-control">
                <button class="cnt-btn" onclick="changeCount('Эспандер', 1200, -1)">-</button>
                <span id="count-Эспандер">0</span>
                <button class="cnt-btn" onclick="changeCount('Эспандер', 1200, 1)">+</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
