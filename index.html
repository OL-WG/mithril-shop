<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MithrilARM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .product-item { background: #1c1c1c; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .product-item img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 10px; }
        .product-name { display: block; font-weight: bold; font-size: 16px; margin-bottom: 5px; min-height: 40px; }
        .price { color: #888; margin-bottom: 10px; font-weight: bold; }
        .add-btn { background: #fff; color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .count-ctrl { display: none; align-items: center; justify-content: space-between; width: 100%; }
        .cnt-btn { background: #333; color: #fff; border: none; width: 35px; height: 35px; border-radius: 8px; font-size: 18px; }
        
        .cart-item { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid #222; text-align: left; }
        .cart-item img { width: 45px; height: 45px; border-radius: 8px; margin-right: 15px; }
        .promo-section { padding: 15px; border-bottom: 1px solid #222; text-align: left; }
        .promo-section input { background: #1c1c1c; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 60%; }
        .address-form { padding: 20px; text-align: left; }
        .address-form input { width: 100%; padding: 12px; margin: 8px 0 15px; background: #1c1c1c; border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; }
        
        /* Стили для экрана проверки */
        .check-section { text-align: left; padding: 15px; background: #1c1c1c; border-radius: 12px; margin: 15px; }
        .check-section h4 { margin: 0 0 10px 0; color: #aaa; font-size: 14px; text-transform: uppercase; }
        .cart-total { display: flex; justify-content: space-between; padding: 20px 15px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="main-screen">
        <h2 style="margin-top: 20px;">MITHRILARM</h2>
        <div class="product-grid">
            <div class="product-item">
                <img src="ruchka.webp">
                <span class="product-name">Ручка Arm</span>
                <div class="price">$35.00</div>
                <button id="add-Handle" class="add-btn" onclick="firstAdd('Handle', 35.00)">ДОБАВИТЬ</button>
                <div id="ctrl-Handle" class="count-ctrl">
                    <button class="cnt-btn" onclick="changeCount('Handle', 35.00, -1)">-</button>
                    <span id="count-Handle">1</span>
                    <button class="cnt-btn" onclick="changeCount('Handle', 35.00, 1)">+</button>
                </div>
            </div>
            <div class="product-item">
                <img src="expander.webp">
                <span class="product-name">Эспандер</span>
                <div class="price">$12.00</div>
                <button id="add-Expander" class="add-btn" onclick="firstAdd('Expander', 12.00)">ДОБАВИТЬ</button>
                <div id="ctrl-Expander" class="count-ctrl">
                    <button class="cnt-btn" onclick="changeCount('Expander', 12.00, -1)">-</button>
                    <span id="count-Expander">1</span>
                    <button class="cnt-btn" onclick="changeCount('Expander', 12.00, 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-screen" style="display: none;">
        <h3 style="padding: 15px; text-align: left;">Ваша корзина</h3>
        <div id="cart-items-list"></div>
        <div class="promo-section">
            <input type="text" id="promo-input" placeholder="Промокод">
            <button onclick="applyPromo()" style="background:#fff; color:#000; border:none; padding:10px; border-radius:8px; font-weight:bold;">OK</button>
            <div id="promo-msg" style="font-size: 12px; margin-top: 5px;"></div>
        </div>
        <div class="cart-total">
            <span>Итог:</span>
            <span id="cart-total-price">$0.00</span>
        </div>
    </div>

    <div id="address-screen" style="display: none;">
        <h3 style="padding: 15px; text-align: left;">Адрес доставки</h3>
        <div class="address-form">
            <input type="text" id="country" placeholder="Страна">
            <input type="text" id="city" placeholder="Город">
            <input type="text" id="street" placeholder="Улица, дом, квартира">
        </div>
    </div>

    <div id="checkout-screen" style="display: none;">
        <h3 style="padding: 15px; text-align: left;">Проверка данных</h3>
        <div class="check-section">
            <h4>Ваш заказ</h4>
            <div id="check-items"></div>
        </div>
        <div class="check-section">
            <h4>Адрес доставки</h4>
            <div id="check-address"></div>
        </div>
        <div class="cart-total">
            <span>К оплате:</span>
            <span id="check-total-price"></span>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
