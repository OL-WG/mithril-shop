<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MithrilARM Shop</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #333; }
        .price { color: #0088cc; font-weight: bold; font-size: 1.2em; }
        .btn { display: inline-block; background: #0088cc; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>MithrilARM 🦾</h1>
    <div class="card">
        <img src="Shopify-Axe.WEBP" alt="Ручка">
        <h3>Ручка для армрестлинга</h3>
        <div class="price">3 500 ₽</div>
        <button class="btn" onclick="sendOrder('Ручка для армрестлинга')">Заказать в боте</button>
    </div>

    <div class="card">
        <img src="IMG-3327.WEBP" alt="Эспандер">
        <h3>Эспандер Mithril</h3>
        <div class="price">1 200 ₽</div>
        <button class="btn" onclick="sendOrder('Эспандер Mithril')">Заказать в боте</button>
    </div>
</body>
</html>
