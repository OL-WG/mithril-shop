<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MithrilARM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-screen">
        <h1 class="logo">MITHRILARM 💪</h1>
        
        <div class="product-grid">
            <div class="product-item">
                <img src="ruchka.webp" alt="Ручка Arm">
                <h4>Ручка Arm</h4>
                <div class="price">3500 ₽</div>
                <div class="count-control">
                    <button class="btn-minus" onclick="changeCount('Ручка Arm', 3500, -1)">-</button>
                    <span id="count-Ручка Arm">0</span>
                    <button class="btn-plus" onclick="changeCount('Ручка Arm', 3500, 1)">+</button>
                </div>
            </div>

            <div class="product-item">
                <img src="expander.webp" alt="Эспандер">
                <h4>Эспандер</h4>
                <div class="price">1200 ₽</div>
                <div class="count-control">
                    <button class="btn-minus" onclick="changeCount('Эспандер', 1200, -1)">-</button>
                    <span id="count-Эспандер">0</span>
                    <button class="btn-plus" onclick="changeCount('Эспандер', 1200, 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-screen" style="display: none; padding: 20px;">
        <h2 class="cart-title">Ваша корзина</h2>
        <div id="cart-items-list"></div>
        <div class="cart-total">
            <span>Итого:</span>
            <span id="cart-total-price">0 ₽</span>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
