<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MithrilARM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #000; color: #fff; margin: 0; font-family: sans-serif;">

    <div id="main-screen">
        <h1 style="text-align: center;">MITHRILARM</h1>
        <div class="product-grid">
            <div class="product-item">
                <img src="ruchka.webp" alt="Ручка">
                <h4>Ручка Arm</h4>
                <div class="price">3500 ₽</div>
                <button class="cnt-btn" onclick="changeCount('Ручка', 3500, 1)">Добавить</button>
            </div>
            <div class="product-item">
                <img src="expander.webp" alt="Эспандер">
                <h4>Эспандер</h4>
                <div class="price">1200 ₽</div>
                <button class="cnt-btn" onclick="changeCount('Эспандер', 1200, 1)">Добавить</button>
            </div>
        </div>
    </div>

    <div id="cart-screen" style="display: none; padding: 20px;">
        <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px;">Ваша корзина</h2>
        <div id="cart-items-list">
            </div>
        <div style="margin-top: 20px; font-size: 1.2em; display: flex; justify-content: space-between;">
            <span>Итого:</span>
            <span id="cart-total-price">0 ₽</span>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
