<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MithrilARM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .product-grid { display: flex; gap: 15px; padding: 15px; overflow-x: auto; }
        .product-item { background: #1c1c1c; border-radius: 12px; padding: 10px; min-width: 140px; text-align: center; }
        .product-item img { width: 80px; height: 80px; object-fit: contain; }
        .count-control { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; }
        .cnt-btn { background: #333; color: #fff; border: none; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; }
        
        /* Стили корзины как в Durger King */
        .cart-item { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid #222; }
        .cart-item img { width: 40px; height: 40px; border-radius: 6px; margin-right: 15px; }
        .cart-item-info { flex-grow: 1; }
        .cart-item-info b { display: block; font-size: 14px; }
        .cart-item-price { font-weight: bold; color: #aaa; }
        .cart-total { display: flex; justify-content: space-between; padding: 20px 15px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="main-screen">
        <h2 style="text-align: center;">MITHRILARM</h2>
        <div class="product-grid">
            <div class="product-item">
                <img src="ruchka.webp" id="img-Ruchka">
                <b>Ручка Arm</b>
                <div>$35.00</div>
                <div class="count-control">
                    <button class="cnt-btn" onclick="changeCount('Ручка Arm', 35.00, -1)">-</button>
                    <span id="count-Ручка Arm">0</span>
                    <button class="cnt-btn" onclick="changeCount('Ручка Arm', 35.00, 1)">+</button>
                </div>
            </div>
            <div class="product-item">
                <img src="expander.webp" id="img-Expander">
                <b>Эспандер</b>
                <div>$12.00</div>
                <div class="count-control">
                    <button class="cnt-btn" onclick="changeCount('Эспандер', 12.00, -1)">-</button>
                    <span id="count-Эспандер">0</span>
                    <button class="cnt-btn" onclick="changeCount('Эспандер', 12.00, 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-screen" style="display: none;">
        <h3 style="padding: 15px 15px 0;">Ваша корзина</h3>
        <div id="cart-items-list"></div>
        <div class="cart-total">
            <span>Итого:</span>
            <span id="cart-total-price">$0.00</span>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
