<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MithrilARM Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>MithrilARM 💪</h1>

    <div class="card">
        <img src="ruchka.webp" alt="Ручка">
        <h3>Ручка для армрестлинга</h3>
        <div class="price">3 500 ₽</div>
        <button class="btn" onclick="addToCart('Ручка', 3500)">Добавить в корзину</button>
    </div>

    <div class="card">
        <img src="expander.webp" alt="Эспандер">
        <h3>Эспандер Mithril</h3>
        <div class="price">1 200 ₽</div>
        <button class="btn" onclick="addToCart('Эспандер', 1200)">Добавить в корзину</button>
    </div>

    <div id="cart-status">
        <b id="cart-text">Выбрано товаров: 0</b>
        <button class="btn" style="background: #28a745 !important; margin-top: 10px;" onclick="sendOrder()">
            Оформить заказ на <span id="total-price">0</span> ₽
        </button>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
